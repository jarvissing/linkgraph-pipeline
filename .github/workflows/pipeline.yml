name: Content Automation Pipeline

# 1. When should this run? Every time code is pushed to the main branch.
on:
  push:
    branches:
      - main
      - master

jobs:
  run-automation:
    # 2. What kind of computer should GitHub spin up? A fresh Ubuntu Linux machine.
    runs-on: ubuntu-latest

    steps:
      # 3. Download your repository files onto the server
      - name: Checkout Code
        uses: actions/checkout@v4

      # 4. Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26'

      # 5. Install the packages from your package.json (like 'marked')
      - name: Install Dependencies
        run: npm install

      # 6. Install the headless Chromium browser so Playwright can run
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      # 7. Execute your script!
      - name: Run Pipeline Engine
      - name: Upload Screenshot Artifact
        uses: actions/upload-artifact@v4
        with:
          name: proof-screenshot
          path: final-proof.png
        run: node publish.js